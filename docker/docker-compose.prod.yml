services:
  db:
    image: postgres:15
    container_name: drinkit_db
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d dodo_stats"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: drinkit_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    image: ghcr.io/LevKorobeinikov/drinkit-stock-transfers:latest
    container_name: drinkit_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ../.env
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../storage:/app/storage
      - ../logs:/app/logs
      - ../drinkit_stock_transfers/tokens.json:/app/drinkit_stock_transfers/tokens.json
      - ../drinkit_stock_transfers/google_api_key.json:/app/drinkit_stock_transfers/google_api_key.json

volumes:
  db_data:
  redis_data: