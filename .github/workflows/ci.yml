name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi
          pip install mypy

      - name: Ruff
        run: poetry run ruff check .

      - name: Mypy
        run: poetry run mypy --ignore-missing-imports bot drinkit_stock_transfers scheduler main.py

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile -t drinkit-stock-transfers:ci .

      - name: Smoke test container
        run: |
          docker run --rm drinkit-stock-transfers:ci \
            python -c "import main; print('container-smoke-ok')"
